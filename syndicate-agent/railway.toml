[build]
builder = "NIXPACKS"
buildCommand = "pip install -r requirements.txt && pip install --no-cache-dir -e ."
watchPatterns = ["src/**", "requirements.txt", "pyproject.toml"]

[deploy]
startCommand = "PYTHONPATH=src python -m syndicate_agent.main"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
healthcheckPath = "/"
numReplicas = 1
sleepApplication = false
